# Demo credentials example
#
# Copy this file and encrypt with SOPS:
#   cp credentials.example.yaml credentials.yaml
#   # Edit credentials.yaml with real values
#   sops -e credentials.yaml > credentials.sops.yaml
#   rm credentials.yaml  # don't commit plaintext!
#
# The demo uses you@yourcompany.com as a memorable example account.

demo:
  email: you@yourcompany.com
  password: REPLACE_WITH_REAL_PASSWORD

# Endpoint to test against (default: production)
endpoint: https://sageox.ai
